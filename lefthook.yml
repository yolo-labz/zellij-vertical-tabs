# Local git hooks. Activate with `lefthook install`.
commit-msg:
  commands:
    no-ai-trailers:
      run: |
        if grep -qiE 'co-authored-by:[[:space:]]*(claude|opus|sonnet|gpt|codex)|generated with claude code|🤖' {1}; then
          echo "Remove the AI authorship trailer / robot emoji from the commit message" >&2
          exit 1
        fi
