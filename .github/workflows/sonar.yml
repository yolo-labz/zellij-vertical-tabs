name: SonarQube scan

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

# Least-privilege baseline (zizmor undocumented-permissions wants a rationale).
permissions:
  contents: read       # checkout source for the scan.
  pull-requests: read  # scan-action reads PR metadata to decorate the PR.

jobs:
  scan:
    name: SonarQube scan
    runs-on: [self-hosted, dokku]
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout (full history for blame-based new-code detection)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Skip if SonarQube host not configured
        id: check
        env:
          HOST: ${{ vars.SONAR_HOST_URL }}
        run: |
          if [ -z "$HOST" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "SONAR_HOST_URL not set - skipping Sonar scan."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: SonarQube scan
        if: steps.check.outputs.skip == 'false'
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          # Pin JAVA_TOOL_OPTIONS so the inherited vm103 host JVM flags
          # cannot stop sonar-scanner from starting (matches the wa lane).
          JAVA_TOOL_OPTIONS: "-XX:+UnlockDiagnosticVMOptions -XX:+UseContainerSupport -XX:MaxRAMPercentage=75"
